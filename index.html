<!DOCTYPE html>
<html>
<head>
    <title>AI Mood Detector</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

<div class="top-container">

<div class="chat-container" id="result"></div>

</body>
</html>
